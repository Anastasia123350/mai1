<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Интерактивный сайт с локациями, артефактами и сказкой">
    <title>Наш Интерактивный Сайт</title>
    
    <style>
        /* ============================================
           CSS CUSTOM PROPERTIES (ПЕРЕМЕННЫЕ)
           ============================================ */
        :root {
            /* Цветовая палитра */
            --color-background-primary: rgba(10, 15, 30, 0.85);
            --color-background-secondary: rgba(25, 35, 60, 0.9);
            --color-background-card: rgba(40, 50, 80, 0.7);
            --color-text-primary: #ffffff;
            --color-text-secondary: #b8c1d1;
            --color-text-muted: #8892a8;
            --color-accent-primary: #7c9fd9;
            --color-accent-secondary: #a78bfa;
            --color-accent-hover: #9db5f0;
            --color-border: rgba(124, 159, 217, 0.3);
            --color-shadow: rgba(0, 0, 0, 0.4);
            --color-success: #4ade80;
            --color-button-bg: rgba(124, 159, 217, 0.2);
            --color-button-hover: rgba(124, 159, 217, 0.4);
            
            /* Типографика */
            --font-family-primary: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-family-secondary: Georgia, 'Times New Roman', Times, serif;
            --font-size-base: 16px;
            --font-size-small: 0.875rem;
            --font-size-medium: 1rem;
            --font-size-large: 1.25rem;
            --font-size-xlarge: 1.5rem;
            --font-size-xxlarge: 2rem;
            --font-size-xxxlarge: 2.5rem;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-bold: 700;
            --line-height-normal: 1.6;
            --line-height-heading: 1.3;
            
            /* Отступы и размеры */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-xxl: 3rem;
            --spacing-xxxl: 4rem;
            
            /* Радиусы скругления */
            --border-radius-sm: 4px;
            --border-radius-md: 8px;
            --border-radius-lg: 16px;
            --border-radius-full: 50%;
            
            /* Тени */
            --shadow-sm: 0 2px 4px var(--color-shadow);
            --shadow-md: 0 4px 12px var(--color-shadow);
            --shadow-lg: 0 8px 24px var(--color-shadow);
            --shadow-xl: 0 16px 48px var(--color-shadow);
            
            /* Анимации */
            --transition-fast: 150ms ease-in-out;
            --transition-normal: 300ms ease-in-out;
            --transition-slow: 500ms ease-in-out;
            
            /* Z-index слои */
            --z-index-base: 1;
            --z-index-overlay: 10;
            --z-index-fixed: 100;
            --z-index-modal: 1000;
        }

        /* ============================================
           СБРОС СТИЛЕЙ И БАЗОВЫЕ НАСТРОЙКИ
           ============================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: var(--font-size-base);
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family-primary);
            font-weight: var(--font-weight-normal);
            line-height: var(--line-height-normal);
            color: var(--color-text-primary);
            background-color: #0a0f1e;
            background-image: url('https://anastasia123350.github.io/mai1/fon.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--color-background-primary);
            z-index: var(--z-index-base);
            pointer-events: none;
        }

        /* ============================================
           УТИЛИТЫ ДЛЯ ДОСТУПНОСТИ
           ============================================ */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ============================================
           КОНТРОЛ МУЗЫКИ (ФИКСИРОВАННЫЙ)
           ============================================ */
        .music-control {
            position: fixed;
            top: var(--spacing-md);
            right: var(--spacing-md);
            z-index: var(--z-index-fixed);
        }

        .music-button {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            background-color: var(--color-button-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius-lg);
            color: var(--color-text-primary);
            font-family: var(--font-family-primary);
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            transition: all var(--transition-normal);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .music-button:hover {
            background-color: var(--color-button-hover);
            border-color: var(--color-accent-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .music-button:focus {
            outline: 2px solid var(--color-accent-primary);
            outline-offset: 2px;
        }

        .music-button:focus:not(:focus-visible) {
            outline: none;
        }

        .music-button:focus-visible {
            outline: 2px solid var(--color-accent-primary);
            outline-offset: 2px;
        }

        .button-status {
            font-size: var(--font-size-small);
            color: var(--color-text-muted);
            transition: color var(--transition-fast);
        }

        .music-button[data-playing="true"] .button-status {
            color: var(--color-success);
        }

        /* ============================================
           ОСНОВНОЙ КОНТЕЙНЕР
           ============================================ */
        .main-container {
            position: relative;
            z-index: var(--z-index-base);
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-xl) var(--spacing-md);
        }

        /* ============================================
           СЕКЦИИ (ОБЩИЕ СТИЛИ)
           ============================================ */
        .section {
            margin-bottom: var(--spacing-xxxl);
            padding: var(--spacing-xl);
            background-color: var(--color-background-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
        }

        .section:hover {
            box-shadow: var(--shadow-xl);
        }

        .section-header {
            margin-bottom: var(--spacing-xl);
            text-align: center;
        }

        .section-title {
            font-family: var(--font-family-secondary);
            font-size: var(--font-size-xxlarge);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            line-height: var(--line-height-heading);
            margin-bottom: var(--spacing-sm);
            text-shadow: 0 2px 4px var(--color-shadow);
        }

        .section-description {
            font-size: var(--font-size-medium);
            color: var(--color-text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* ============================================
           СЕТКА ИЗОБРАЖЕНИЙ
           ============================================ */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-lg);
            justify-items: center;
        }

        .image-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 300px;
        }

        .interactive-image {
            width: 100%;
            height: auto;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: var(--border-radius-md);
            border: 2px solid transparent;
            transition: all var(--transition-normal);
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }

        .interactive-image:hover {
            transform: scale(1.03);
            border-color: var(--color-accent-primary);
            box-shadow: var(--shadow-lg);
            filter: brightness(1.1);
        }

        .interactive-image:focus {
            outline: 3px solid var(--color-accent-secondary);
            outline-offset: 3px;
        }

        .interactive-image:active {
            transform: scale(0.98);
        }

        .image-caption {
            margin-top: var(--spacing-sm);
            font-size: var(--font-size-small);
            color: var(--color-text-secondary);
            text-align: center;
            font-weight: var(--font-weight-medium);
        }

        /* ============================================
           БЛОК СКАЗКИ
           ============================================ */
        .story-content {
            background-color: var(--color-background-card);
            border-radius: var(--border-radius-md);
            padding: var(--spacing-lg);
            border: 1px solid var(--color-border);
        }

        .story-article {
            font-family: var(--font-family-secondary);
            font-size: var(--font-size-medium);
            line-height: var(--line-height-normal);
            color: var(--color-text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loading-text {
            text-align: center;
            color: var(--color-text-muted);
            font-style: italic;
            padding: var(--spacing-xl);
        }

        .story-article p {
            margin-bottom: var(--spacing-md);
        }

        .story-article p:last-child {
            margin-bottom: 0;
        }

        /* ============================================
           ПОДВАЛ САЙТА
           ============================================ */
        .site-footer {
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-md);
            color: var(--color-text-muted);
            font-size: var(--font-size-small);
        }

        .footer-text {
            margin: 0;
        }

        /* ============================================
           АНИМАЦИИ И ЭФФЕКТЫ
           ============================================ */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section {
            animation: fadeIn var(--transition-slow) ease-out forwards;
        }

        #locations { animation-delay: 0.1s; }
        #artifacts { animation-delay: 0.2s; }
        #story { animation-delay: 0.3s; }

        /* Эффект пульсации для кнопки музыки при воспроизведении */
        @keyframes pulse {
            0%, 100% {
                box-shadow: var(--shadow-md);
            }
            50% {
                box-shadow: 0 0 0 4px rgba(124, 159, 217, 0.4), var(--shadow-md);
            }
        }

        .music-button[data-playing="true"] {
            animation: pulse 2s infinite ease-in-out;
        }

        /* ============================================
           АДАПТИВНЫЙ ДИЗАЙН (МЕДИА-ЗАПРОСЫ)
           ============================================ */

        /* Планшеты и меньше */
        @media screen and (max-width: 768px) {
            :root {
                --font-size-base: 15px;
                --spacing-xl: 1.5rem;
                --spacing-xxl: 2rem;
                --spacing-xxxl: 2.5rem;
            }
            
            .section-title {
                font-size: var(--font-size-xlarge);
            }
            
            .images-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: var(--spacing-md);
            }
            
            .music-control {
                top: var(--spacing-sm);
                right: var(--spacing-sm);
            }
            
            .music-button {
                padding: var(--spacing-xs) var(--spacing-sm);
                font-size: 0.75rem;
            }
        }

        /* Мобильные устройства */
        @media screen and (max-width: 480px) {
            :root {
                --font-size-base: 14px;
                --spacing-lg: 1rem;
                --spacing-xl: 1.25rem;
            }
            
            .section {
                padding: var(--spacing-lg);
                margin-bottom: var(--spacing-xxl);
            }
            
            .section-title {
                font-size: var(--font-size-large);
            }
            
            .section-description {
                font-size: var(--font-size-small);
            }
            
            .images-grid {
                grid-template-columns: 1fr;
            }
            
            .image-wrapper {
                max-width: 100%;
            }
            
            .story-content {
                padding: var(--spacing-md);
            }
            
            .music-button {
                flex-direction: column;
                gap: var(--spacing-xs);
                text-align: center;
            }
        }

        /* ============================================
           ПРЕДПОЧТЕНИЕ УМЕНЬШЕННОГО ДВИЖЕНИЯ
           ============================================ */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            
            .interactive-image:hover {
                transform: none;
            }
            
            .music-button:hover {
                transform: none;
            }
            
            .section {
                animation: none !important;
            }
        }

        /* ============================================
           ФОКУС ДЛЯ КЛАВИАТУРНОЙ НАВИГАЦИИ
           ============================================ */
        :focus-visible {
            outline: 2px solid var(--color-accent-primary);
            outline-offset: 2px;
        }

        /* ============================================
           СТИЛИ ДЛЯ ЗАГРУЗКИ ИЗОБРАЖЕНИЙ
           ============================================ */
        .interactive-image[loading="lazy"] {
            background-color: var(--color-background-card);
            transition: background-color var(--transition-normal);
        }

        .interactive-image.loaded {
            background-color: transparent;
        }

        /* ============================================
           СТИЛИ ДЛЯ ОШИБОК ЗАГРУЗКИ ИЗОБРАЖЕНИЙ
           ============================================ */
        .interactive-image.error {
            opacity: 0.6;
            filter: grayscale(100%);
        }

        .interactive-image.error + .image-caption {
            color: var(--color-text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Фоновая музыка с кнопкой управления -->
    <div class="music-control">
        <button id="backgroundMusicToggle" class="music-button" aria-label="Включить/выключить фоновую музыку">
            <span class="button-text">🎵 Фоновая музыка</span>
            <span class="button-status">Выключена</span>
        </button>
    </div>

    <!-- Аудио элемент для фоновой музыки -->
    <audio id="backgroundMusic" loop preload="auto">
        <source src="https://anastasia123350.github.io/mai1/fon.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио элемент.
    </audio>

    <!-- Аудио элемент для музыки при клике на изображения -->
    <audio id="clickMusic" preload="auto">
        <source src="https://anastasia123350.github.io/mai1/saveliy_4328491.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио элемент.
    </audio>

    <!-- Основной контейнер -->
    <div class="main-container">
        
        <!-- Первый блок: Локации -->
        <section id="locations" class="section locations-section" aria-labelledby="locations-heading">
            <header class="section-header">
                <h2 id="locations-heading" class="section-title">Локации</h2>
                <p class="section-description">Исследуйте наши локации. Нажмите на изображение, чтобы услышать музыку.</p>
            </header>
            
            <div class="images-grid locations-grid">
                <div class="image-wrapper">
                    <img 
                        src="https://anastasia123350.github.io/mai1/l1.jpeg" 
                        alt="Локация 1" 
                        class="location-image interactive-image"
                        data-image-type="location"
                        data-image-number="1"
                        loading="lazy"
                    >
                    <figcaption class="image-caption">Локация 1</figcaption>
                </div>
                
                <div class="image-wrapper">
                    <img 
                        src="https://anastasia123350.github.io/mai1/l2.jpeg" 
                        alt="Локация 2" 
                        class="location-image interactive-image"
                        data-image-type="location"
                        data-image-number="2"
                        loading="lazy"
                    >
                    <figcaption class="image-caption">Локация 2</figcaption>
                </div>
                
                <div class="image-wrapper">
                    <img 
                        src="https://anastasia123350.github.io/mai1/l3.jpeg" 
                        alt="Локация 3" 
                        class="location-image interactive-image"
                        data-image-type="location"
                        data-image-number="3"
                        loading="lazy"
                    >
                    <figcaption class="image-caption">Локация 3</figcaption>
                </div>
            </div>
        </section>

        <!-- Второй блок: Артефакты -->
        <section id="artifacts" class="section artifacts-section" aria-labelledby="artifacts-heading">
            <header class="section-header">
                <h2 id="artifacts-heading" class="section-title">Артефакты</h2>
                <p class="section-description">Уникальные артефакты. Нажмите на изображение, чтобы услышать музыку.</p>
            </header>
            
            <div class="images-grid artifacts-grid">
                <div class="image-wrapper">
                    <img 
                        src="https://anastasia123350.github.io/mai1/a1.jpeg" 
                        alt="Артефакт 1" 
                        class="artifact-image interactive-image"
                        data-image-type="artifact"
                        data-image-number="1"
                        loading="lazy"
                    >
                    <figcaption class="image-caption">Артефакт 1</figcaption>
                </div>
                
                <div class="image-wrapper">
                    <img 
                        src="https://anastasia123350.github.io/mai1/a2.jpeg" 
                        alt="Артефакт 2" 
                        class="artifact-image interactive-image"
                        data-image-type="artifact"
                        data-image-number="2"
                        loading="lazy"
                    >
                    <figcaption class="image-caption">Артефакт 2</figcaption>
                </div>
            </div>
        </section>

        <!-- Третий блок: Сказка -->
        <section id="story" class="section story-section" aria-labelledby="story-heading">
            <header class="section-header">
                <h2 id="story-heading" class="section-title">Наша Сказка</h2>
                <p class="section-description">История, записанная в файле spiral.txt</p>
            </header>
            
            <div class="story-content">
                <article class="story-article" id="storyText">
                    <!-- Сюда будет загружен текст из spiral.txt через JavaScript -->
                    <p class="loading-text">Загрузка сказки...</p>
                </article>
            </div>
        </section>

        <!-- Подвал сайта -->
        <footer class="site-footer">
            <p class="footer-text">&copy; 2026 Наш Интерактивный Сайт. Все права защищены.</p>
        </footer>

    </div>

    <script>
        /**
         * ============================================
         * ГЛОБАЛЬНОЕ СОСТОЯНИЕ ПРИЛОЖЕНИЯ
         * ============================================
         */
        const AppState = {
            isBackgroundMusicPlaying: false,
            isClickMusicPlaying: false,
            backgroundMusicVolume: 0.3,
            clickMusicVolume: 0.7,
            fadeDuration: 500
        };

        /**
         * ============================================
         * DOM ЭЛЕМЕНТЫ
         * ============================================
         */
        const DOMElements = {
            backgroundMusic: document.getElementById('backgroundMusic'),
            clickMusic: document.getElementById('clickMusic'),
            backgroundMusicToggle: document.getElementById('backgroundMusicToggle'),
            buttonStatus: document.querySelector('.button-status'),
            buttonText: document.querySelector('.button-text'),
            interactiveImages: document.querySelectorAll('.interactive-image'),
            storyText: document.getElementById('storyText')
        };

        /**
         * ============================================
         * УПРАВЛЕНИЕ ФОНОВОЙ МУЗЫКОЙ
         * ============================================
         */

        /**
         * Инициализация фоновой музыки
         */
        function initBackgroundMusic() {
            const audio = DOMElements.backgroundMusic;
            
            if (!audio) {
                console.error('Элемент фоновой музыки не найден');
                return;
            }
            
            // Установка начальной громкости
            audio.volume = AppState.backgroundMusicVolume;
            audio.loop = true;
            audio.preload = 'auto';
            
            // Обработчики событий
            audio.addEventListener('canplaythrough', handleBackgroundMusicReady);
            audio.addEventListener('ended', handleBackgroundMusicEnded);
            audio.addEventListener('error', handleBackgroundMusicError);
        }

        /**
         * Обработчик готовности фоновой музыки
         */
        function handleBackgroundMusicReady() {
            console.log('Фоновая музыка готова к воспроизведению');
            // Автоматически не запускаем - браузеры блокируют autoplay
        }

        /**
         * Обработчик окончания фоновой музыки
         */
        function handleBackgroundMusicEnded() {
            console.log('Фоновая музыка завершилась (должна быть на loop)');
        }

        /**
         * Обработчик ошибки фоновой музыки
         */
        function handleBackgroundMusicError(event) {
            console.error('Ошибка загрузки фоновой музыки:', event);
            updateButtonStatus('Ошибка загрузки', false);
        }

        /**
         * Включение/выключение фоновой музыки
         */
        function toggleBackgroundMusic() {
            const audio = DOMElements.backgroundMusic;
            
            if (!audio) {
                console.error('Аудио элемент не найден');
                return;
            }
            
            if (AppState.isBackgroundMusicPlaying) {
                pauseBackgroundMusic();
            } else {
                playBackgroundMusic();
            }
        }

        /**
         * Воспроизведение фоновой музыки
         */
        async function playBackgroundMusic() {
            const audio = DOMElements.backgroundMusic;
            
            try {
                await audio.play();
                AppState.isBackgroundMusicPlaying = true;
                updateButtonStatus('Воспроизводится', true);
                console.log('Фоновая музыка воспроизводится');
            } catch (error) {
                console.error('Ошибка при воспроизведении фоновой музыки:', error);
                updateButtonStatus('Не удалось воспроизвести', false);
            }
        }

        /**
         * Пауза фоновой музыки
         */
        function pauseBackgroundMusic() {
            const audio = DOMElements.backgroundMusic;
            
            if (audio) {
                audio.pause();
                AppState.isBackgroundMusicPlaying = false;
                updateButtonStatus('Выключена', false);
                console.log('Фоновая музыка на паузе');
            }
        }

        /**
         * Плавное затухание фоновой музыки
         */
        function fadeOutBackgroundMusic() {
            const audio = DOMElements.backgroundMusic;
            const fadeStep = AppState.backgroundMusicVolume / 20;
            const fadeInterval = AppState.fadeDuration / 20;
            
            const fadeOut = setInterval(() => {
                if (audio.volume > fadeStep) {
                    audio.volume -= fadeStep;
                } else {
                    audio.volume = 0;
                    audio.pause();
                    clearInterval(fadeOut);
                    audio.volume = AppState.backgroundMusicVolume;
                }
            }, fadeInterval);
        }

        /**
         * Плавное появление фоновой музыки
         */
        function fadeInBackgroundMusic() {
            const audio = DOMElements.backgroundMusic;
            audio.volume = 0;
            audio.play();
            
            const fadeStep = AppState.backgroundMusicVolume / 20;
            const fadeInterval = AppState.fadeDuration / 20;
            
            const fadeIn = setInterval(() => {
                if (audio.volume < AppState.backgroundMusicVolume - fadeStep) {
                    audio.volume += fadeStep;
                } else {
                    audio.volume = AppState.backgroundMusicVolume;
                    clearInterval(fadeIn);
                }
            }, fadeInterval);
        }

        /**
         * Обновление статуса кнопки
         */
        function updateButtonStatus(statusText, isPlaying) {
            if (DOMElements.buttonStatus) {
                DOMElements.buttonStatus.textContent = statusText;
            }
            
            if (DOMElements.backgroundMusicToggle) {
                DOMElements.backgroundMusicToggle.setAttribute('data-playing', isPlaying.toString());
            }
            
            if (DOMElements.buttonText) {
                DOMElements.buttonText.textContent = isPlaying ? '🎵 Фоновая музыка' : '🔇 Фоновая музыка';
            }
        }

        /**
         * ============================================
         * УПРАВЛЕНИЕ МУЗЫКОЙ ПРИ КЛИКЕ
         * ============================================
         */

        /**
         * Инициализация музыки для кликов
         */
        function initClickMusic() {
            const audio = DOMElements.clickMusic;
            
            if (!audio) {
                console.error('Элемент музыки для кликов не найден');
                return;
            }
            
            // Установка начальной громкости
            audio.volume = AppState.clickMusicVolume;
            audio.preload = 'auto';
            
            // Обработчики событий
            audio.addEventListener('ended', handleClickMusicEnded);
            audio.addEventListener('error', handleClickMusicError);
        }

        /**
         * Обработчик окончания музыки при клике
         */
        function handleClickMusicEnded() {
            console.log('Музыка при клике завершилась');
            AppState.isClickMusicPlaying = false;
            
            // Возобновляем фоновую музыку если она была включена
            if (AppState.isBackgroundMusicPlaying) {
                fadeInBackgroundMusic();
            }
        }

        /**
         * Обработчик ошибки музыки при клике
         */
        function handleClickMusicError(event) {
            console.error('Ошибка загрузки музыки при клике:', event);
            AppState.isClickMusicPlaying = false;
        }

        /**
         * Воспроизведение музыки при клике на изображение
         */
        async function playClickMusic(imageElement) {
            const clickAudio = DOMElements.clickMusic;
            const backgroundAudio = DOMElements.backgroundMusic;
            
            if (!clickAudio) {
                console.error('Аудио элемент для кликов не найден');
                return;
            }
            
            // Если уже играет, перезапускаем
            if (AppState.isClickMusicPlaying) {
                clickAudio.currentTime = 0;
            }
            
            // Приостанавливаем фоновую музыку плавно
            if (AppState.isBackgroundMusicPlaying) {
                fadeOutBackgroundMusic();
            }
            
            try {
                await clickAudio.play();
                AppState.isClickMusicPlaying = true;
                
                // Добавляем визуальный эффект для изображения
                highlightImage(imageElement);
                
                console.log('Музыка при клике воспроизводится');
            } catch (error) {
                console.error('Ошибка при воспроизведении музыки:', error);
                AppState.isClickMusicPlaying = false;
                
                // Если ошибка, возобновляем фоновую музыку
                if (AppState.isBackgroundMusicPlaying) {
                    fadeInBackgroundMusic();
                }
            }
        }

        /**
         * Визуальное выделение изображения при клике
         */
        function highlightImage(imageElement) {
            // Убираем выделение со всех изображений
            DOMElements.interactiveImages.forEach(img => {
                img.style.borderColor = 'transparent';
                img.style.transform = 'scale(1)';
            });
            
            // Выделяем текущее изображение
            imageElement.style.borderColor = 'var(--color-accent-primary)';
            imageElement.style.transform = 'scale(1.05)';
            imageElement.style.boxShadow = '0 0 20px var(--color-accent-primary)';
            
            // Возвращаем стили через время
            setTimeout(() => {
                imageElement.style.borderColor = 'transparent';
                imageElement.style.transform = 'scale(1)';
                imageElement.style.boxShadow = '';
            }, 1000);
        }

        /**
         * ============================================
         * ОБРАБОТЧИКИ СОБЫТИЙ ДЛЯ ИЗОБРАЖЕНИЙ
         * ============================================
         */

        /**
         * Инициализация обработчиков кликов по изображениям
         */
        function initImageClickHandlers() {
            const images = DOMElements.interactiveImages;
            
            images.forEach((image, index) => {
                // Обработчик клика
                image.addEventListener('click', handleImageClick);
                
                // Обработчик клавиатуры (для доступности)
                image.addEventListener('keydown', handleImageKeydown);
                
                // Устанавливаем tabindex для возможности фокуса
                image.setAttribute('tabindex', '0');
                image.setAttribute('role', 'button');
                image.setAttribute('aria-label', `${image.alt}. Нажмите для воспроизведения музыки.`);
                
                // Обработчики загрузки
                image.addEventListener('load', () => handleImageLoad(image));
                image.addEventListener('error', () => handleImageError(image));
            });
        }

        /**
         * Обработчик клика по изображению
         */
        function handleImageClick(event) {
            const imageElement = event.currentTarget;
            console.log(`Клик по изображению: ${imageElement.dataset.imageType} ${imageElement.dataset.imageNumber}`);
            
            playClickMusic(imageElement);
        }

        /**
         * Обработчик нажатия клавиш на изображении
         */
        function handleImageKeydown(event) {
            // Enter или Space
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                handleImageClick(event);
            }
        }

        /**
         * Обработчик успешной загрузки изображения
         */
        function handleImageLoad(imageElement) {
            imageElement.classList.add('loaded');
            console.log(`Изображение загружено: ${imageElement.src}`);
        }

        /**
         * Обработчик ошибки загрузки изображения
         */
        function handleImageError(imageElement) {
            imageElement.classList.add('error');
            console.error(`Ошибка загрузки изображения: ${imageElement.src}`);
        }

        /**
         * ============================================
         * ЗАГРУЗКА СКАЗКИ ИЗ ФАЙЛА
         * ============================================
         */

        /**
         * Загрузка текста сказки из файла spiral.txt
         */
        async function loadStoryText() {
            const storyContainer = DOMElements.storyText;
            
            if (!storyContainer) {
                console.error('Контейнер для сказки не найден');
                return;
            }
            
            try {
                updateStoryContent('Загрузка сказки...', 'loading');
                
                const response = await fetch('https://anastasia123350.github.io/mai1/spiral.txt');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const text = await response.text();
                
                if (text.trim()) {
                    // Форматируем текст (заменяем переносы строк на <p>)
                    const formattedText = formatStoryText(text);
                    updateStoryContent(formattedText, 'content');
                    console.log('Сказка успешно загружена');
                } else {
                    throw new Error('Файл пуст');
                }
                
            } catch (error) {
                console.error('Ошибка загрузки сказки:', error);
                updateStoryContent(
                    'Не удалось загрузить сказку. Убедитесь, что файл spiral.txt существует и доступен.<br><br>' +
                    'Ошибка: ' + error.message,
                    'error'
                );
            }
        }

        /**
         * Форматирование текста сказки
         */
        function formatStoryText(text) {
            // Разбиваем на параграфы
            const paragraphs = text.split(/\n\s*\n/);
            
            // Создаем HTML
            const html = paragraphs
                .map(paragraph => paragraph.trim())
                .filter(paragraph => paragraph.length > 0)
                .map(paragraph => `<p>${escapeHtml(paragraph)}</p>`)
                .join('');
            
            return html || `<p>${escapeHtml(text)}</p>`;
        }

        /**
         * Экранирование HTML-символов
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Обновление содержимого сказки
         */
        function updateStoryContent(content, type) {
            const storyContainer = DOMElements.storyText;
            
            if (!storyContainer) return;
            
            if (type === 'loading') {
                storyContainer.innerHTML = `<p class="loading-text">${content}</p>`;
            } else if (type === 'error') {
                storyContainer.innerHTML = `<p class="error-text" style="color: #f87171;">${content}</p>`;
            } else {
                storyContainer.innerHTML = content;
            }
        }

        /**
         * ============================================
         * ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ
         * ============================================
         */

        /**
         * Основная функция инициализации
         */
        function initApp() {
            console.log('Инициализация приложения...');
            
            // Инициализация аудио
            initBackgroundMusic();
            initClickMusic();
            
            // Инициализация обработчиков
            initImageClickHandlers();
            
            // Инициализация кнопки фоновой музыки
            initMusicToggleButton();
            
            // Загрузка сказки
            loadStoryText();
            
            // Добавляем обработчик видимости страницы
            initPageVisibilityHandler();
            
            console.log('Приложение инициализировано');
        }

        /**
         * Инициализация кнопки управления музыкой
         */
        function initMusicToggleButton() {
            const button = DOMElements.backgroundMusicToggle;
            
            if (button) {
                button.addEventListener('click', toggleBackgroundMusic);
                console.log('Кнопка управления музыкой инициализирована');
            } else {
                console.error('Кнопка управления музыкой не найдена');
            }
        }

        /**
         * Обработчик изменения видимости страницы
         */
        function initPageVisibilityHandler() {
            document.addEventListener('visibilitychange', handleVisibilityChange);
        }

        /**
         * Обработчик изменения видимости
         */
        function handleVisibilityChange() {
            if (document.hidden) {
                // Страница скрыта (пользователь перешел на другую вкладку)
                console.log('Страница скрыта');
                // Можно при необходимости приостановить музыку
            } else {
                // Страница видима
                console.log('Страница видима');
            }
        }

        /**
         * ============================================
         * ЗАПУСК ПРИЛОЖЕНИЯ
         * ============================================
         */

        // Ждем полной загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            // DOM уже загружен
            initApp();
        }

        // Обработка ошибок на уровне приложения
        window.addEventListener('error', function(event) {
            console.error('Глобальная ошибка:', event.error);
        });

        window.addEventListener('unhandledrejection', function(event) {
            console.error('Необработанное Promise отклонение:', event.reason);
        });

        console.log('JavaScript загружен. Ожидание инициализации...');
    </script>
</body>
</html>
